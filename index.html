<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Intelligence — Audio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding-bottom: 90px; }

  .hero { padding: 32px 24px 20px; border-bottom: 1px solid #1e2130; }
  .hero h1 { font-size: 24px; font-weight: 700; color: #fff; }
  .hero p { color: #555; margin-top: 4px; font-size: 13px; }
  .stats { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
  .stat-val { font-size: 22px; font-weight: 700; color: #7b8cde; }
  .stat-label { font-size: 11px; color: #555; margin-top: 1px; }

  .resume-bar { display: none; margin: 12px 16px 0; background: #1a2038; border: 1px solid #7b8cde55; border-radius: 10px; padding: 10px 14px; cursor: pointer; }
  .resume-bar.visible { display: flex; align-items: center; gap: 10px; }
  .resume-icon { font-size: 18px; }
  .resume-text { flex: 1; }
  .resume-title { font-size: 13px; font-weight: 600; color: #a5b4fc; }
  .resume-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .resume-btn { font-size: 11px; background: #7b8cde; color: #fff; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }

  .section-header { padding: 20px 24px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #3a3f5a; display: flex; align-items: center; gap: 8px; }
  .section-header::after { content: ''; flex: 1; height: 1px; background: #1a1d27; }
  .track-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .track { background: #1a1d27; border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .track-row { display: flex; align-items: center; gap: 12px; }
  .track:hover { background: #20233a; }
  .track.active  { border-color: #7b8cde33; background: #1c1f35; }
  .track.playing { border-color: #7b8cde;   background: #1a2038; }
  .track.done    { opacity: 0.45; }
  .track.done .track-name { text-decoration: line-through; text-decoration-color: #3a3f5a; }

  .play-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; transition: all 0.12s; background: #252840; color: #7b8cde; }
  .track:hover .play-btn { background: #7b8cde22; }
  .track.playing .play-btn { background: #7b8cde; color: #fff; }
  .track.done .play-btn { color: #4ade80; font-size: 16px; }

  .track-num { font-size: 12px; color: #3a3f5a; width: 18px; text-align: center; flex-shrink: 0; }
  .track.playing .track-num { color: #7b8cde; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 14px; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track.playing .track-name { color: #a5b4fc; }
  .track-why { font-size: 11px; color: #555; margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .track-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 0.3px; }
  .badge-critical { background: #3d1515; color: #f87171; }
  .badge-high     { background: #152035; color: #60a5fa; }
  .badge-medium   { background: #152515; color: #4ade80; }
  .track-dur { font-size: 11px; color: #3a3f5a; }

  /* Expanded section shown only on playing track */
  .track-expand { display: none; margin-top: 14px; padding-top: 12px; border-top: 1px solid #252840; }
  .track.playing .track-expand { display: block; }
  .expand-times { display: flex; justify-content: space-between; font-size: 12px; color: #7b8cde; margin-bottom: 8px; font-variant-numeric: tabular-nums; }

  /* Native range slider — styled for dark theme */
  .scrubber {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 44px;        /* large touch target */
    background: transparent;
    cursor: pointer;
    outline: none;
  }
  .scrubber::-webkit-slider-runnable-track {
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #7b8cde var(--pct,0%), #2a2d3a var(--pct,0%));
  }
  .scrubber::-moz-range-track {
    height: 6px; border-radius: 3px; background: #2a2d3a;
  }
  .scrubber::-moz-range-progress {
    height: 6px; border-radius: 3px; background: #7b8cde;
  }
  .scrubber::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #a5b4fc;
    box-shadow: 0 0 6px #7b8cde99;
    margin-top: -8px;
    cursor: pointer;
  }
  .scrubber::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #a5b4fc;
    border: none;
    cursor: pointer;
  }

  /* Bottom player */
  .player { position: fixed; bottom: 0; left: 0; right: 0; background: #13151fee; backdrop-filter: blur(12px); border-top: 1px solid #1e2130; padding: 10px 16px; z-index: 100; }
  .player-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .p-info { flex: 1; min-width: 0; }
  .p-title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-sub { font-size: 10px; color: #555; margin-top: 1px; }
  .p-controls { display: flex; align-items: center; gap: 8px; }
  .p-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; background: #252840; color: #aaa; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.12s; }
  .p-btn:hover { color: #fff; background: #35385a; }
  .p-play { background: #7b8cde; color: #fff; width: 40px; height: 40px; font-size: 14px; }
  .p-play:hover { background: #8f9de8; }
  .speeds { display: flex; gap: 4px; }
  .spd { padding: 4px 7px; font-size: 10px; border-radius: 5px; border: none; background: #252840; color: #555; cursor: pointer; transition: all 0.12s; }
  .spd.on { background: #3a4080; color: #a5b4fc; }
</style>
</head>
<body>

<div class="hero">
  <h1>🎧 Tax Intelligence</h1>
  <p>21 episodes · Restaurant, Franchise &amp; Logistics · Federal + NY / NJ / CT</p>
  <div class="stats">
    <div><div class="stat-val">27</div><div class="stat-label">Episodes</div></div>
    <div><div class="stat-val">~4h</div><div class="stat-label">Total</div></div>
    <div><div class="stat-val">16</div><div class="stat-label">Restaurant topics</div></div>
    <div><div class="stat-val">5</div><div class="stat-label">Logistics topics</div></div>
    <div><div class="stat-val">6</div><div class="stat-label">Real estate topics</div></div>
  </div>
</div>

<div class="resume-bar" id="resumeBar">
  <span class="resume-icon">↩️</span>
  <div class="resume-text">
    <div class="resume-title" id="resumeTitle">—</div>
    <div class="resume-sub" id="resumeSub">Tap to resume where you left off</div>
  </div>
  <button class="resume-btn" id="resumeBtn">Resume</button>
</div>

<div id="listContainer"></div>

<div class="player">
  <div class="player-top">
    <div class="p-info">
      <div class="p-title" id="pTitle">Tap a track to play</div>
      <div class="p-sub" id="pSub">Tax Intelligence Audio</div>
    </div>
    <div class="p-controls">
      <button class="p-btn" id="btnPrev">⏮</button>
      <button class="p-btn p-play" id="btnPlay">▶</button>
      <button class="p-btn" id="btnNext">⏭</button>
    </div>
  </div>
  <div class="speeds" id="speeds">
    <button class="spd" data-s="0.85">0.85×</button>
    <button class="spd on" data-s="1">1×</button>
    <button class="spd" data-s="1.25">1.25×</button>
    <button class="spd" data-s="1.5">1.5×</button>
    <button class="spd" data-s="2">2×</button>
  </div>
</div>

<script>
const TRACKS = [
  { num:0,  file:"weekly_briefing_latest.mp3", name:"🔴 LIVE: Weekly Briefing — 2026-06-22", dur:"~4m", badge:"critical", group:"briefing", why:"This week's tax changes relevant to your restaurants, real estate, and logistics operations." },
  { num:1,  file:"01_13_Audit_Recordkeeping.mp3",   name:"Audit & Recordkeeping",          dur:"~8m",  badge:"critical", group:"restaurant", why:"How the IRS thinks about your restaurants. Start here before anything else." },
  { num:2,  file:"02_06_Sales_Use_Tax.mp3",          name:"Sales & Use Tax",                dur:"~9m",  badge:"critical", group:"restaurant", why:"NY, NJ, CT each draw the line differently on food, catering, and alcohol." },
  { num:3,  file:"03_03_Payroll_Employment.mp3",     name:"Payroll & Employment",           dur:"~9m",  badge:"critical", group:"restaurant", why:"Trust Fund Recovery Penalty is personal. The most important section you'll listen to." },
  { num:4,  file:"04_08_Business_Sales.mp3",         name:"Business Sales & Dispositions",  dur:"~8m",  badge:"high",     group:"restaurant", why:"Personal goodwill, depreciation recapture, installment sales. Read before you sell anything." },
  { num:5,  file:"05_04_Entity_Structure.mp3",       name:"Entity Structure",               dur:"~8m",  badge:"high",     group:"restaurant", why:"How your LLCs are classified determines how all your income is taxed." },
  { num:6,  file:"06_01_Business_Expenses.mp3",      name:"Business Expenses",              dur:"~10m", badge:"high",     group:"restaurant", why:"Meals, uniforms, management fees — the basics that get people audited." },
  { num:7,  file:"07_02_Depreciation.mp3",           name:"Depreciation",                   dur:"~10m", badge:"high",     group:"restaurant", why:"QIP and bonus depreciation — where restaurant tax money is captured or left behind." },
  { num:8,  file:"08_05_Multi_Entity_Ops.mp3",       name:"Multi-Entity Operations",        dur:"~9m",  badge:"high",     group:"restaurant", why:"Intercompany pricing, loans, shared employees — the complexity you live with every day." },
  { num:9,  file:"09_07_Business_Acquisitions.mp3",  name:"Business Acquisitions",          dur:"~8m",  badge:"high",     group:"restaurant", why:"Asset vs. stock purchase, section 1060 allocation — every deal needs this framework." },
  { num:10, file:"10_09_Franchise_Issues.mp3",       name:"Franchise Issues",               dur:"~7m",  badge:"medium",   group:"restaurant", why:"Section 197 amortization of fees, royalty deductibility — franchise-specific rules." },
  { num:11, file:"11_10_Leasehold_Improvements.mp3", name:"Leasehold Improvements",         dur:"~10m", badge:"high",     group:"restaurant", why:"Every build-out. QIP classification and cost segregation can save six figures." },
  { num:12, file:"12_11_Real_Estate.mp3",            name:"Real Estate",                    dur:"~10m", badge:"medium",   group:"restaurant", why:"For when you own instead of lease. Section 1031, PropCo structure, passive rules." },
  { num:13, file:"13_12_Retirement_Planning.mp3",    name:"Retirement Planning",            dur:"~8m",  badge:"medium",   group:"restaurant", why:"Controlled group rules catch multi-entity operators off guard." },
  { num:14, file:"14_14_State_Tax_NY.mp3",           name:"State Tax: New York",            dur:"~10m", badge:"critical", group:"restaurant", why:"PTET, UBT, MCTMT — New York is expensive and aggressive." },
  { num:15, file:"15_15_State_Tax_NJ.mp3",           name:"State Tax: New Jersey",          dur:"~8m",  badge:"high",     group:"restaurant", why:"NJ BAIT election, combined reporting, payroll add-ons." },
  { num:16, file:"16_16_State_Tax_CT.mp3",           name:"State Tax: Connecticut",         dur:"~6m",  badge:"medium",   group:"restaurant", why:"CT PTE tax, 7.35% meals rate, Business Entity Tax." },
  { num:22, file:"22_22_Landlord_Federal.mp3",     name:"Landlord Tax: Federal",          dur:"~9m",  badge:"high",     group:"realestate", why:"Passive activity rules, depreciation, 1031 exchanges — the federal framework every landlord must know." },
  { num:23, file:"23_23_Real_Estate_NYC_NYS.mp3",  name:"Real Estate: NYC & New York",    dur:"~9m",  badge:"critical", group:"realestate", why:"NYC transfer taxes, rent stabilization, RPTT, 421-a — New York real estate is its own tax world." },
  { num:24, file:"24_24_Real_Estate_NJ.mp3",       name:"Real Estate: New Jersey",        dur:"~8m",  badge:"high",     group:"realestate", why:"NJ transfer fees, non-resident withholding, bulk sale rules — NJ has traps most landlords miss." },
  { num:25, file:"25_25_Real_Estate_CT.mp3",       name:"Real Estate: Connecticut",       dur:"~9m",  badge:"medium",   group:"realestate", why:"CT conveyance tax tiers, luxury surcharge, PTE on rental income." },
  { num:26, file:"26_26_Real_Estate_Virginia.mp3", name:"Real Estate: Virginia",          dur:"~9m",  badge:"medium",   group:"realestate", why:"VA income tax, recordation tax, BPOL, Northern Virginia locality rules." },
  { num:27, file:"27_27_Landlord_Multi_State.mp3", name:"Landlord Multi-State Strategy",  dur:"~9m",  badge:"high",     group:"realestate", why:"PropCo structures, multi-state filing, cost segregation, 1031 across states — the full landlord playbook." },
  // Warehouse & Logistics
  { num:17, file:"17_17_Logistics_Sales_Tax.mp3",    name:"Logistics Sales Tax",            dur:"~9m",  badge:"critical", group:"logistics",  why:"Warehousing, fulfillment, and transportation are taxed differently in every state. Invoice structure is everything." },
  { num:18, file:"18_18_Nexus_Expansion.mp3",        name:"Nexus: Entering New States",     dur:"~9m",  badge:"critical", group:"logistics",  why:"A warehouse lease creates tax obligations from day one in that state. Know before you sign." },
  { num:19, file:"19_19_Driver_Classification.mp3",  name:"Driver & Worker Classification", dur:"~10m", badge:"critical", group:"logistics",  why:"The most-enforced area in logistics. NJ's ABC test makes nearly all drivers employees." },
  { num:20, file:"20_20_Logistics_Equipment.mp3",    name:"Logistics Equipment",            dur:"~8m",  badge:"high",     group:"logistics",  why:"Forklifts, fleet trucks, racking — verify GVWR on every vehicle or you lose the deduction." },
  { num:21, file:"21_21_DOT_Compliance.mp3",         name:"DOT Compliance & Tax",           dur:"~11m", badge:"medium",   group:"logistics",  why:"IFTA, Form 2290, drug testing programs — all deductible, all required to be filed." },
];

function loadPlayed()   { try { return JSON.parse(localStorage.getItem('txPlayed')||'[]'); } catch(e){ return []; } }
function savePlayed(a)  { try { localStorage.setItem('txPlayed', JSON.stringify(a)); } catch(e){} }
function loadSession()  { try { return JSON.parse(localStorage.getItem('txSession')||'null'); } catch(e){ return null; } }
function saveSession(s) { try { localStorage.setItem('txSession', JSON.stringify(s)); } catch(e){} }

let played  = loadPlayed();
let session = loadSession();
let cur = -1, playing = false, speed = 1, audio = null, timer = null;
let scrubbing = false;

function fmt(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function updateResumeBar() {
  const bar = document.getElementById('resumeBar');
  if (!session) { bar.classList.remove('visible'); return; }
  const t = TRACKS[session.i];
  document.getElementById('resumeTitle').textContent = 'Track ' + t.num + ': ' + t.name;
  document.getElementById('resumeSub').textContent   = 'Last position: ' + fmt(session.time||0);
  bar.classList.add('visible');
}

document.getElementById('resumeBtn').addEventListener('click', () => { if (session) playAt(session.i, session.time||0); });
document.getElementById('resumeBar').addEventListener('click', e => { if (e.target.id !== 'resumeBtn' && session) playAt(session.i, session.time||0); });

function render() {
  const c = document.getElementById('listContainer');
  const groups = [
    { key:'briefing', label:'🔴 This Week — Weekly Briefing' },
    { key:'restaurant', label:'🍽️ Restaurant & Franchise — 16 Episodes' },
    { key:'logistics',  label:'📦 Warehouse & Logistics — 5 Episodes' },
    { key:'realestate', label:'🏢 Real Estate & Landlord — 6 Episodes' },
  ];
  c.innerHTML = '';
  groups.forEach(g => {
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = g.label;
    c.appendChild(hdr);
    const list = document.createElement('div');
    list.className = 'track-list';
    TRACKS.filter(t => t.group === g.key).forEach(t => {
      const i = TRACKS.indexOf(t);
      const isDone    = played.includes(i) && i !== cur;
      const isPlaying = i === cur && playing;
      const isActive  = i === cur && !playing;
      let cls = 'track';
      if (isPlaying) cls += ' playing';
      else if (isActive) cls += ' active';
      if (isDone) cls += ' done';
      const icon = isPlaying ? '⏸' : isDone ? '✓' : '▶';

      const div = document.createElement('div');
      div.className = cls;
      div.innerHTML = `
        <div class="track-row">
          <button class="play-btn">${icon}</button>
          <span class="track-num">${t.num}</span>
          <div class="track-info">
            <div class="track-name">${t.name}</div>
            <div class="track-why">${t.why}</div>
          </div>
          <div class="track-right">
            <span class="badge badge-${t.badge}">${t.badge.toUpperCase()}</span>
            <span class="track-dur">${t.dur}</span>
          </div>
        </div>
        <div class="track-expand">
          <div class="expand-times">
            <span id="cardElapsed">0:00</span>
            <span id="cardTotal">—</span>
          </div>
          <input type="range" class="scrubber" id="cardScrub" min="0" max="1000" value="0" step="1">
        </div>`;

      // Clicking the row toggles play/pause; scrubber handles its own events
      div.querySelector('.track-row').addEventListener('click', () => {
        isPlaying ? pause() : isActive ? resume() : playAt(i, 0);
      });
      const scrubEl = div.querySelector('.scrubber');
      if (scrubEl) {
        scrubEl.addEventListener('click',      e => e.stopPropagation());
        scrubEl.addEventListener('touchstart', e => e.stopPropagation(), {passive:true});
        scrubEl.addEventListener('touchend',   e => e.stopPropagation(), {passive:true});
        scrubEl.addEventListener('touchmove',  e => e.stopPropagation(), {passive:true});
      }

      list.appendChild(div);
    });
    c.appendChild(list);
  });

  // Wire scrubber after DOM is built
  const scrub = document.getElementById('cardScrub');
  if (scrub) {
    scrub.addEventListener('input', () => {
      scrubbing = true;
      if (audio && audio.duration) {
        audio.currentTime = (scrub.value / 1000) * audio.duration;
        const el = document.getElementById('cardElapsed');
        if (el) el.textContent = fmt(audio.currentTime);
      }
    });
    scrub.addEventListener('change', () => { scrubbing = false; });
    scrub.addEventListener('touchend', () => { scrubbing = false; });
  }
}

function updateScrubber() {
  if (!audio || scrubbing) return;
  const pct = audio.duration ? audio.currentTime / audio.duration : 0;
  const scrub = document.getElementById('cardScrub');
  if (scrub) {
    const val = Math.round(pct * 1000);
    scrub.value = val;
    scrub.style.setProperty('--pct', (pct*100).toFixed(1)+'%');
  }
  const el = document.getElementById('cardElapsed');
  const tot = document.getElementById('cardTotal');
  if (el) el.textContent = fmt(audio.currentTime);
  if (tot && audio.duration) tot.textContent = fmt(audio.duration);
  document.getElementById('pTitle').textContent = TRACKS[cur].name;
}

function fadeOut(audioEl, ms, cb) {
  const steps = ms / 40;
  const dec = audioEl.volume / steps;
  const iv = setInterval(() => {
    audioEl.volume = Math.max(0, audioEl.volume - dec);
    if (audioEl.volume <= 0) { clearInterval(iv); audioEl.pause(); cb(); }
  }, 40);
}

function fadeIn(audioEl, ms) {
  audioEl.volume = 0;
  const inc = 1 / (ms / 40);
  const iv = setInterval(() => {
    audioEl.volume = Math.min(1, audioEl.volume + inc);
    if (audioEl.volume >= 1) clearInterval(iv);
  }, 40);
}

function playAt(i, startTime) {
  if (audio) { audio.pause(); clearInterval(timer); }
  cur = i;
  const t = TRACKS[i];
  audio = new Audio(t.file);
  audio.playbackRate = speed;
  if (startTime > 0) audio.currentTime = startTime;
  audio.play().catch(()=>{});
  fadeIn(audio, 800);
  playing = true;
  document.getElementById('pSub').textContent = 'Track ' + t.num + ' of 27';
  document.getElementById('btnPlay').textContent = '⏸';
  timer = setInterval(() => {
    if (!audio) return;
    updateScrubber();
    if (Math.round(audio.currentTime) % 5 === 0) {
      session = { i: cur, time: Math.floor(audio.currentTime) };
      saveSession(session);
    }
  }, 400);
  audio.addEventListener('timeupdate', function checkFade() {
    if (audio && audio.duration && audio.currentTime >= audio.duration - 1.5) {
      audio.removeEventListener('timeupdate', checkFade);
      const step = 40, steps = 1500 / step;
      const dec = audio.volume / steps;
      const iv = setInterval(() => {
        if (!audio) { clearInterval(iv); return; }
        audio.volume = Math.max(0, audio.volume - dec);
        if (audio.volume <= 0) clearInterval(iv);
      }, step);
    }
  });
  audio.onended = () => {
    clearInterval(timer);
    if (!played.includes(i)) { played.push(i); savePlayed(played); }
    saveSession(null); session = null;
    if (cur < TRACKS.length-1) playAt(cur+1, 0);
    else { playing=false; document.getElementById('btnPlay').textContent='▶'; render(); updateResumeBar(); }
  };
  session = { i, time: startTime };
  saveSession(session);
  render();
  updateResumeBar();
}

function pause() {
  audio.pause(); playing = false;
  session = { i: cur, time: Math.floor(audio.currentTime) };
  saveSession(session);
  document.getElementById('btnPlay').textContent = '▶';
  render(); updateResumeBar();
}

function resume() {
  audio.play().catch(()=>{}); playing = true;
  document.getElementById('btnPlay').textContent = '⏸';
  render();
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (cur === -1) playAt(0, 0);
  else if (playing) pause();
  else resume();
});
document.getElementById('btnPrev').addEventListener('click', () => { if (cur > 0) playAt(cur-1, 0); });
document.getElementById('btnNext').addEventListener('click', () => { if (cur < TRACKS.length-1) playAt(cur+1, 0); });

document.getElementById('speeds').addEventListener('click', e => {
  const b = e.target.closest('.spd');
  if (!b) return;
  speed = parseFloat(b.dataset.s);
  if (audio) audio.playbackRate = speed;
  document.querySelectorAll('.spd').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
});

render();
updateResumeBar();
</script>
</body>
</html>
