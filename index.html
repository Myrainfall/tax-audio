<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Intelligence — Audio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding-bottom: 90px; }

  .hero { padding: 32px 24px 20px; border-bottom: 1px solid #1e2130; }
  .hero h1 { font-size: 24px; font-weight: 700; color: #fff; }
  .hero p { color: #555; margin-top: 4px; font-size: 13px; }
  .stats { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
  .stat-val { font-size: 22px; font-weight: 700; color: #7b8cde; }
  .stat-label { font-size: 11px; color: #555; margin-top: 1px; }

  .section-header { padding: 20px 24px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #3a3f5a; display: flex; align-items: center; gap: 8px; }
  .section-header::after { content: ''; flex: 1; height: 1px; background: #1a1d27; }

  .track-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .track { background: #1a1d27; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.12s; border: 1px solid transparent; }
  .track:hover { background: #20233a; }
  .track.active { border-color: #7b8cde33; background: #1c1f35; }
  .track.playing { border-color: #7b8cde; background: #1a2038; }

  .play-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; transition: all 0.12s; background: #252840; color: #7b8cde; }
  .track:hover .play-btn { background: #7b8cde22; }
  .track.playing .play-btn { background: #7b8cde; color: #fff; }

  .track-num { font-size: 12px; color: #3a3f5a; width: 18px; text-align: center; flex-shrink: 0; }
  .track.playing .track-num { color: #7b8cde; }

  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 14px; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track.playing .track-name { color: #a5b4fc; }
  .track-why { font-size: 11px; color: #555; margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .track-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 0.3px; }
  .badge-critical { background: #3d1515; color: #f87171; }
  .badge-high { background: #152035; color: #60a5fa; }
  .badge-medium { background: #152515; color: #4ade80; }
  .track-dur { font-size: 11px; color: #3a3f5a; }

  /* Bottom player */
  .player { position: fixed; bottom: 0; left: 0; right: 0; background: #13151fee; backdrop-filter: blur(12px); border-top: 1px solid #1e2130; padding: 10px 16px; z-index: 100; }
  .player-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .p-info { flex: 1; min-width: 0; }
  .p-title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-sub { font-size: 10px; color: #555; margin-top: 1px; }
  .p-controls { display: flex; align-items: center; gap: 8px; }
  .p-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; background: #252840; color: #aaa; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.12s; }
  .p-btn:hover { color: #fff; background: #35385a; }
  .p-play { background: #7b8cde; color: #fff; width: 40px; height: 40px; font-size: 14px; }
  .p-play:hover { background: #8f9de8; }
  .player-bottom { display: flex; align-items: center; gap: 10px; }
  .prog-wrap { flex: 1; }
  .prog-bg { height: 3px; background: #2a2d3a; border-radius: 2px; cursor: pointer; }
  .prog-fill { height: 3px; background: linear-gradient(90deg, #7b8cde, #a78bfa); border-radius: 2px; width: 0%; transition: width 0.4s linear; pointer-events: none; }
  .p-time { font-size: 10px; color: #555; white-space: nowrap; }
  .speeds { display: flex; gap: 4px; }
  .spd { padding: 4px 7px; font-size: 10px; border-radius: 5px; border: none; background: #252840; color: #555; cursor: pointer; transition: all 0.12s; }
  .spd.on { background: #3a4080; color: #a5b4fc; }
</style>
</head>
<body>

<div class="hero">
  <h1>🎧 Tax Intelligence</h1>
  <p>21 episodes · Restaurant, Franchise &amp; Logistics · Federal + NY / NJ / CT</p>
  <div class="stats">
    <div><div class="stat-val">21</div><div class="stat-label">Episodes</div></div>
    <div><div class="stat-val">~3h</div><div class="stat-label">Total</div></div>
    <div><div class="stat-val">16</div><div class="stat-label">Restaurant topics</div></div>
    <div><div class="stat-val">5</div><div class="stat-label">Logistics topics</div></div>
  </div>
</div>

<div id="listContainer"></div>

<div class="player">
  <div class="player-top">
    <div class="p-info">
      <div class="p-title" id="pTitle">Tap a track to play</div>
      <div class="p-sub" id="pSub">Tax Intelligence Audio</div>
    </div>
    <div class="p-controls">
      <button class="p-btn" id="btnPrev">⏮</button>
      <button class="p-btn p-play" id="btnPlay">▶</button>
      <button class="p-btn" id="btnNext">⏭</button>
    </div>
  </div>
  <div class="player-bottom">
    <span class="p-time" id="pElapsed">0:00</span>
    <div class="prog-wrap">
      <div class="prog-bg" id="progBg"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <span class="p-time" id="pTotal">—</span>
    <div class="speeds">
      <button class="spd" data-s="0.85">0.85×</button>
      <button class="spd on" data-s="1">1×</button>
      <button class="spd" data-s="1.25">1.25×</button>
      <button class="spd" data-s="1.5">1.5×</button>
    </div>
  </div>
</div>

<script>
const TRACKS = [
  // Restaurant & Franchise
  { num:1,  file:"01_13_Audit_Recordkeeping.mp3",   name:"Audit & Recordkeeping",          dur:"~8m",  badge:"critical", group:"restaurant", why:"How the IRS thinks about your restaurants. Start here before anything else." },
  { num:2,  file:"02_06_Sales_Use_Tax.mp3",          name:"Sales & Use Tax",                dur:"~9m",  badge:"critical", group:"restaurant", why:"NY, NJ, CT each draw the line differently on food, catering, and alcohol." },
  { num:3,  file:"03_03_Payroll_Employment.mp3",     name:"Payroll & Employment",           dur:"~9m",  badge:"critical", group:"restaurant", why:"Trust Fund Recovery Penalty is personal. The most important section you'll listen to." },
  { num:4,  file:"04_08_Business_Sales.mp3",         name:"Business Sales & Dispositions",  dur:"~8m",  badge:"high",     group:"restaurant", why:"Personal goodwill, depreciation recapture, installment sales. Read before you sell anything." },
  { num:5,  file:"05_04_Entity_Structure.mp3",       name:"Entity Structure",               dur:"~8m",  badge:"high",     group:"restaurant", why:"How your LLCs are classified determines how all your income is taxed." },
  { num:6,  file:"06_01_Business_Expenses.mp3",      name:"Business Expenses",              dur:"~10m", badge:"high",     group:"restaurant", why:"Meals, uniforms, management fees — the basics that get people audited." },
  { num:7,  file:"07_02_Depreciation.mp3",           name:"Depreciation",                   dur:"~10m", badge:"high",     group:"restaurant", why:"QIP and bonus depreciation — where restaurant tax money is captured or left behind." },
  { num:8,  file:"08_05_Multi_Entity_Ops.mp3",       name:"Multi-Entity Operations",        dur:"~9m",  badge:"high",     group:"restaurant", why:"Intercompany pricing, loans, shared employees — the complexity you live with every day." },
  { num:9,  file:"09_07_Business_Acquisitions.mp3",  name:"Business Acquisitions",          dur:"~8m",  badge:"high",     group:"restaurant", why:"Asset vs. stock purchase, §1060 allocation — every deal needs this framework." },
  { num:10, file:"10_09_Franchise_Issues.mp3",       name:"Franchise Issues",               dur:"~7m",  badge:"medium",   group:"restaurant", why:"§197 amortization of fees, royalty deductibility — franchise-specific rules." },
  { num:11, file:"11_10_Leasehold_Improvements.mp3", name:"Leasehold Improvements",         dur:"~10m", badge:"high",     group:"restaurant", why:"Every build-out. QIP classification and cost segregation can save six figures." },
  { num:12, file:"12_11_Real_Estate.mp3",            name:"Real Estate",                    dur:"~10m", badge:"medium",   group:"restaurant", why:"For when you own instead of lease. §1031, PropCo structure, passive rules." },
  { num:13, file:"13_12_Retirement_Planning.mp3",    name:"Retirement Planning",            dur:"~8m",  badge:"medium",   group:"restaurant", why:"Controlled group rules catch multi-entity operators off guard." },
  { num:14, file:"14_14_State_Tax_NY.mp3",           name:"State Tax: New York",            dur:"~10m", badge:"critical", group:"restaurant", why:"PTET, UBT, MCTMT — New York is expensive and aggressive." },
  { num:15, file:"15_15_State_Tax_NJ.mp3",           name:"State Tax: New Jersey",          dur:"~8m",  badge:"high",     group:"restaurant", why:"NJ BAIT election, combined reporting, payroll add-ons." },
  { num:16, file:"16_16_State_Tax_CT.mp3",           name:"State Tax: Connecticut",         dur:"~6m",  badge:"medium",   group:"restaurant", why:"CT PTE tax, 7.35% meals rate, Business Entity Tax." },
  // Warehouse & Logistics
  { num:17, file:"17_17_Logistics_Sales_Tax.mp3",    name:"Logistics Sales Tax",            dur:"~9m",  badge:"critical", group:"logistics",  why:"Warehousing, fulfillment, and transportation are taxed differently in every state. Invoice structure is everything." },
  { num:18, file:"18_18_Nexus_Expansion.mp3",        name:"Nexus: Entering New States",     dur:"~9m",  badge:"critical", group:"logistics",  why:"A warehouse lease creates tax obligations from day one in that state. Know before you sign." },
  { num:19, file:"19_19_Driver_Classification.mp3",  name:"Driver & Worker Classification", dur:"~10m", badge:"critical", group:"logistics",  why:"The most-enforced area in logistics. NJ's ABC test makes nearly all drivers employees." },
  { num:20, file:"20_20_Logistics_Equipment.mp3",    name:"Logistics Equipment",            dur:"~8m",  badge:"high",     group:"logistics",  why:"Forklifts, fleet trucks, racking — verify GVWR on every vehicle or you lose the deduction." },
  { num:21, file:"21_21_DOT_Compliance.mp3",         name:"DOT Compliance & Tax",           dur:"~11m", badge:"medium",   group:"logistics",  why:"IFTA, Form 2290, drug testing programs — all deductible, all required to be filed." },
];

let cur = -1, playing = false, speed = 1, audio = null, timer = null;

function fmt(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function render() {
  const c = document.getElementById('listContainer');
  const groups = [
    { key:'restaurant', label:'🍽️ Restaurant & Franchise — 16 Episodes' },
    { key:'logistics',  label:'📦 Warehouse & Logistics — 5 Episodes'  },
  ];
  c.innerHTML = '';
  groups.forEach(g => {
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = g.label;
    c.appendChild(hdr);
    const list = document.createElement('div');
    list.className = 'track-list';
    TRACKS.filter(t => t.group === g.key).forEach(t => {
      const i = TRACKS.indexOf(t);
      const div = document.createElement('div');
      div.className = 'track' + (i===cur ? (playing?' playing':' active') : '');
      div.innerHTML = `
        <button class="play-btn">${i===cur&&playing?'⏸':'▶'}</button>
        <div class="track-num">${t.num}</div>
        <div class="track-info">
          <div class="track-name">${t.name}</div>
          <div class="track-why">${t.why}</div>
        </div>
        <div class="track-right">
          <span class="badge badge-${t.badge}">${t.badge.toUpperCase()}</span>
          <span class="track-dur">${t.dur}</span>
        </div>`;
      div.addEventListener('click', () => { i===cur&&playing ? pause() : i===cur ? resume() : play(i); });
      list.appendChild(div);
    });
    c.appendChild(list);
  });
}

function play(i) {
  if (audio) { audio.pause(); clearInterval(timer); }
  cur = i; const t = TRACKS[i];
  audio = new Audio(t.file);
  audio.playbackRate = speed;
  audio.play();
  playing = true;
  document.getElementById('pTitle').textContent = t.name;
  document.getElementById('pSub').textContent = 'Track ' + t.num + ' of 21';
  document.getElementById('btnPlay').textContent = '⏸';
  timer = setInterval(() => {
    if (!audio) return;
    const pct = audio.duration ? audio.currentTime/audio.duration*100 : 0;
    document.getElementById('progFill').style.width = pct+'%';
    document.getElementById('pElapsed').
